Onedrop:
  Form:
    Hubspot:
      api:
        access-token: xxx-xxx-xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
        portalId: xxxxxxx
      recaptcha_v2:
        sitekey: xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
        secretkey: xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
        enableRecaptcha: false
        invisible: false

      finishers:
        - identifier: Onedrop.Form.Hubspot:HubSpotFinisher
          options: []
  AjaxForm:
    includeJavascript: true
Neos:
  Neos:
    fusion:
      autoInclude:
        Onedrop.Form.Hubspot: true

    Ui:
      resources:
        javascript:
          Onedrop.Form.Hubspot:CacheFlushButtonEditor:
            resource: 'resource://Onedrop.Form.Hubspot/Public/JavaScript/CacheFlushButtonEditor/Plugin.js'

  AjaxForm:
    includeJavascript: true
  Flow:
    mvc:
      routes:
        'Onedrop.Form.Hubspot':
          position: 'start'
