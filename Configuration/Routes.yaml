-
  name: 'Hubspot Cache Flush'
  uriPattern: 'neos/__hubspot/cache/flush'
  defaults:
    '@package': 'Onedrop.Form.Hubspot'
    '@controller': 'HubspotCache'
    '@action': 'flush'
    '@format': 'json'
  httpMethods: ['POST']
-
  name: 'Ajax Form Endpoint'
  uriPattern: '__form/submit'
  defaults:
    '@package': 'Onedrop.Form.Hubspot'
    '@controller': 'AjaxForm'
    '@action': 'submit'
    '@format': 'html'
    'locale': ''
  httpMethods: ['GET','POST']
