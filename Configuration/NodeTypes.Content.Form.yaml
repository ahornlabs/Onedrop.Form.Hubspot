'Onedrop.Form.Hubspot:Content.Form':
  superTypes:
    'Neos.Neos:Content': true
  ui:
    label: 'Hubspot Formular'
    icon: 'fas fa-clipboard-list'
    position: 600
    inspector:
      groups:
        form:
          label: 'Formulareinstellungen'
          position: 30
          icon: 'fas fa-clipboard-list'
  properties:
    formIdentifier:
      type: string
      ui:
        label: 'Hubspot Formular'
        reloadIfChanged: true
        inspector:
          group: form
          editor: 'Neos.Neos/Inspector/Editors/SelectBoxEditor'
          editorOptions:
            placeholder: 'Formular wählen'
            dataSourceIdentifier: 'onedrop-form-hubspot-forms'
    hubspotFormsReloadButton:
      type: string
      ui:
        label: ' '
        reloadIfChanged: false
        inspector:
          group: form
          position: 40
          editor: 'Onedrop.Form.Hubspot/Inspector/Editors/NoopButtonEditor'
          editorOptions:
            label: 'Formular-Liste neu laden'